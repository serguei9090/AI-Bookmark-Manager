name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome — format check
        run: bunx @biomejs/biome format --no-errors-on-unmatched .

      - name: Biome — lint & import check
        run: bunx @biomejs/biome check --no-errors-on-unmatched .

      - name: TypeScript — type check
        run: bun run lint

      - name: Vite — production build
        run: bun run build
