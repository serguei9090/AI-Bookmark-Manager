pre-commit:
  parallel: true
  commands:
    biome-format:
      glob: "*.{js,ts,jsx,tsx,json,css,jsonc}"
      run: biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,css,jsonc}"
      run: biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    type-check:
      glob: "*.{ts,tsx}"
      run: bun run lint
